services:
  postgres:
    image: postgres:16
    container_name: news_rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: news_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
